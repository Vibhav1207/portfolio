<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a1a3e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1b2a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4aa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7b61ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <g opacity="0.08">
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1" />
    <line x1="100" y1="0" x2="100" y2="630" stroke="#fff" stroke-width="1" />
    <line x1="200" y1="0" x2="200" y2="630" stroke="#fff" stroke-width="1" />
    <line x1="300" y1="0" x2="300" y2="630" stroke="#fff" stroke-width="1" />
    <line x1="400" y1="0" x2="400" y2="630" stroke="#fff" stroke-width="1" />
    <line x1="500" y1="0" x2="500" y2="630" stroke="#fff" stroke-width="1" />
    <line x1="600" y1="0" x2="600" y2="630" stroke="#fff" stroke-width="1" />
    <line x1="700" y1="0" x2="700" y2="630" stroke="#fff" stroke-width="1" />
    <line x1="800" y1="0" x2="800" y2="630" stroke="#fff" stroke-width="1" />
    <line x1="900" y1="0" x2="900" y2="630" stroke="#fff" stroke-width="1" />
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="#fff" stroke-width="1" />
    <line x1="1100" y1="0" x2="1100" y2="630" stroke="#fff" stroke-width="1" />
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#fff" stroke-width="1" />
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#fff" stroke-width="1" />
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#fff" stroke-width="1" />
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#fff" stroke-width="1" />
    <line x1="0" y1="500" x2="1200" y2="500" stroke="#fff" stroke-width="1" />
  </g>
  <!-- Rupee symbol -->
  <text x="600" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="120" font-weight="bold" fill="url(#accent)" opacity="0.9">₹</text>
  <!-- Title -->
  <text x="600" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffffff" opacity="0.95">Rupee Matrix</text>
  <!-- Subtitle -->
  <text x="600" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#ffffff" opacity="0.4">Image coming soon</text>
  <!-- Decorative dots -->
  <circle cx="520" cy="460" r="3" fill="#00d4aa" opacity="0.6"/>
  <circle cx="540" cy="460" r="3" fill="#00d4aa" opacity="0.4"/>
  <circle cx="560" cy="460" r="3" fill="#7b61ff" opacity="0.4"/>
  <circle cx="580" cy="460" r="3" fill="#7b61ff" opacity="0.3"/>
  <circle cx="600" cy="460" r="3" fill="#7b61ff" opacity="0.5"/>
  <circle cx="620" cy="460" r="3" fill="#00d4aa" opacity="0.3"/>
  <circle cx="640" cy="460" r="3" fill="#00d4aa" opacity="0.4"/>
  <circle cx="660" cy="460" r="3" fill="#7b61ff" opacity="0.4"/>
  <circle cx="680" cy="460" r="3" fill="#7b61ff" opacity="0.6"/>
</svg>
